<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FinPlan Mobile — Pełna Wersja</title>

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0f14">
<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22FinPlan%20Pro%22,%22short_name%22:%22FinPlan%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#0d0f14%22,%22theme_color%22:%22#0d0f14%22}">

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --surface2: #1e2230;
    --border: rgba(255,255,255,0.07);
    --text: #eef0f4;
    --text-dim: #7a8099;
    --accent: #c8f53e;
    --accent-dim: rgba(200,245,62,0.12);
    --red: #ff5757;
    --green: #3effa3;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    padding-bottom: calc(80px + var(--safe-bottom));
    line-height: 1.5;
  }

  header {
    padding: calc(20px + var(--safe-top)) 20px 15px;
    background: var(--bg);
    position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid var(--border);
  }

  .logo { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--text); }
  .logo span { color: var(--accent); font-style: italic; }

  main { padding: 16px; }

  /* TABS */
  .tab-content { display: none; }
  .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* CARDS */
  .card {
    background: var(--surface);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
  }

  .card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 8px; }
  .big-val { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 600; }

  /* LIST ITEMS */
  .tx-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }

  /* STRATEGY DISPLAY */
  .strat-card {
    background: var(--surface2);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .strat-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: var(--accent-dim); color: var(--accent); }

  /* ALLOCATION BARS */
  .alloc-row { margin-top: 10px; }
  .bar-bg { height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; margin: 4px 0; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 3px; }

  /* NAV BAR */
  nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: calc(65px + var(--safe-bottom));
    background: rgba(22, 25, 33, 0.98);
    backdrop-filter: blur(10px);
    display: grid; grid-template-columns: repeat(3, 1fr);
    border-top: 1px solid var(--border);
    padding-bottom: var(--safe-bottom);
    z-index: 1000;
  }

  .nav-btn {
    background: none; border: none; color: var(--text-dim);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; gap: 4px;
  }

  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; fill: currentColor; }

  .sep { border: 0; border-top: 1px solid var(--border); margin: 15px 0; }

</style>
</head>
<body>

<header>
  <div class="logo">Fin<span>Plan</span></div>
</header>

<main>
  <section id="tab-dashboard" class="tab-content active">
    <div class="card">
      <div class="card-label">Suma oszczędności</div>
      <div class="big-val" id="total-balance">42 560.00 zł</div>
      <div style="font-size:13px; color:var(--green); margin-top:5px;">+2.4% od zeszłego miesiąca</div>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
      <div class="card" style="padding:15px;">
        <div class="card-label">Wpływy</div>
        <div class="big-val" style="font-size:18px; color:var(--green);">+8 400</div>
      </div>
      <div class="card" style="padding:15px;">
        <div class="card-label">Wydatki</div>
        <div class="big-val" style="font-size:18px; color:var(--red);">-3 120</div>
      </div>
    </div>

    <h3 style="margin: 10px 0 15px; font-family: 'DM Serif Display', serif;">Ostatnie transakcje</h3>
    <div id="tx-list"></div>
  </section>

  <section id="tab-strategies" class="tab-content">
    <h3 style="margin-bottom: 20px; font-family: 'DM Serif Display', serif;">Strategie Inwestycyjne</h3>
    <div id="strat-list"></div>
  </section>

  <section id="tab-tools" class="tab-content">
    <div class="card">
      <h3 style="margin-bottom:15px;">Kalkulator wolności</h3>
      <div class="card-label">Miesięczne koszty</div>
      <input type="number" value="5000" style="width:100%; background:var(--surface2); border:1px solid var(--border); padding:12px; border-radius:10px; color:white; margin-bottom:15px;">
      <div class="card-label">Kapitał docelowy (4%)</div>
      <div class="big-val" style="color:var(--accent)">1 500 000 zł</div>
    </div>
  </section>
</main>

<nav>
  <button class="nav-btn active" onclick="showTab('dashboard', this)">
    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    Portfel
  </button>
  <button class="nav-btn" onclick="showTab('strategies', this)">
    <svg viewBox="0 0 24 24"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg>
    Strategie
  </button>
  <button class="nav-btn" onclick="showTab('tools', this)">
    <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.5 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
    Narzędzia
  </button>
</nav>

<script>
  // DANE IDENTYCZNE Z PIERWOTNĄ WERSJĄ
  const STRATEGIES = [
    {
      id: 'gem',
      name: "GEM (Global Equity Momentum)",
      risk: "Wysokie",
      desc: "Model Gary'ego Antonacciego oparty na momentum absolutnym i relatywnym.",
      alloc: [{l:"Akcje USA (VTI)", p:100}, {l:"Akcje Świat ex-USA (VXUS)", p:0}, {l:"Obligacje (BND)", p:0}],
      tags: ["Trend Following", "Dual Momentum"],
      note: "Przełączaj między akcjami a obligacjami na podstawie wyników z ostatnich 12 miesięcy."
    },
    {
      id: 'awp',
      name: "All Weather Portfolio",
      risk: "Niskie",
      desc: "Strategia Raya Dalio zaprojektowana, by zarabiać w każdej fazie cyklu gospodarczego.",
      alloc: [{l:"Akcje", p:30}, {l:"Obligacje Długoterminowe", p:40}, {l:"Obligacje Średnioterminowe", p:15}, {l:"Złoto", p:7.5}, {l:"Surowce", p:7.5}],
      tags: ["Diversification", "Risk Parity"],
      note: "Bardzo niska zmienność, idealna dla kapitału, którego nie chcemy narażać na duże spadki."
    },
    {
      id: '6040',
      name: "Klasyczny 60/40",
      risk: "Średnie",
      desc: "Standardowy portfel zbalansowany, fundament nowoczesnej teorii portfelowej.",
      alloc: [{l:"Akcje (S&P500)", p:60}, {l:"Obligacje Skarbowe", p:40}],
      tags: ["Passive", "Benchmark"],
      note: "Najprostsza i najskuteczniejsza strategia długoterminowa dla większości inwestorów."
    }
  ];

  const TRANSACTIONS = [
    { title: 'Wypłata Marzec', cat: 'Praca', amt: 7200, date: '01.03.2024' },
    { title: 'Zakupy spożywcze', cat: 'Jedzenie', amt: -340, date: '02.03.2024' },
    { title: 'Czynsz i opłaty', cat: 'Dom', amt: -2450, date: '03.03.2024' },
    { title: 'Dywidenda (VUSA)', cat: 'Inwestycje', amt: 120, date: '05.03.2024' }
  ];

  function renderApp() {
    // Renderuj Transakcje
    const txContainer = document.getElementById('tx-list');
    txContainer.innerHTML = TRANSACTIONS.map(t => `
      <div class="tx-item">
        <div>
          <div style="font-weight:500;">${t.title}</div>
          <div style="font-size:12px; color:var(--text-dim);">${t.date} • ${t.cat}</div>
        </div>
        <div style="font-family:'JetBrains Mono'; font-weight:600; color:${t.amt > 0 ? 'var(--green)' : 'var(--text)'}">
          ${t.amt > 0 ? '+' : ''}${t.amt.toFixed(2)}
        </div>
      </div>
    `).join('');

    // Renderuj Strategie (Identyczne z oryginałem)
    const stratContainer = document.getElementById('strat-list');
    stratContainer.innerHTML = STRATEGIES.map(s => `
      <div class="card">
        <div class="strat-header">
          <div>
            <div class="tag">${s.risk}</div>
            <h4 style="margin-top:5px;">${s.name}</h4>
          </div>
        </div>
        <p style="font-size:13px; color:var(--text-dim); margin-bottom:15px;">${s.desc}</p>
        
        <div class="card-label">Alokacja kapitału</div>
        ${s.alloc.map(a => `
          <div class="alloc-row">
            <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:2px;">
              <span>${a.l}</span>
              <span>${a.p}%</span>
            </div>
            <div class="bar-bg"><div class="bar-fill" style="width:${a.p}%"></div></div>
          </div>
        `).join('')}
        
        <hr class="sep">
        <div class="card-label">Wskazówka</div>
        <div style="font-size:12px; color:var(--text-dim); font-style:italic;">${s.note}</div>
      </div>
    `).join('');
  }

  function showTab(tabId, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tabId).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    window.scrollTo(0,0);
  }

  // Uruchomienie aplikacji
  renderApp();
</script>
</body>
</html>
